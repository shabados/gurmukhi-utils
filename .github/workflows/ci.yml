name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: rustup component add rustfmt clippy
      - uses: Swatinem/rust-cache@v2
      - run: mise run fmt
      - run: mise run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: Swatinem/rust-cache@v2
      - run: mise run test

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: rustup target add wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - run: mise run build
      - run: mise run build:wasm
      - uses: actions/upload-artifact@v7
        with:
          name: build-artifacts
          path: |
            target/release/uniffi-bindgen
            target/release/uniffi-bindgen-js
            target/release/libgurmukhi.so
            target/wasm32-unknown-unknown/release/gurmukhi.wasm

  build-native:
    uses: ./.github/workflows/build-native.yml

  generate:
    name: Generate (${{ matrix.language }})
    needs: [build]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: [ruby, kotlin, swift, python, javascript]
        include:
          - language: ruby
            setup: sudo gem install ffi --no-document
          - language: kotlin
            setup: true
          - language: swift
            setup: true
          - language: python
            setup: true
          - language: javascript
            setup: true
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - uses: actions/setup-java@v4
        if: matrix.language == 'kotlin'
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
        if: matrix.language == 'kotlin'
      - uses: swift-actions/setup-swift@v2
        if: matrix.language == 'swift'
      - uses: actions/download-artifact@v8
        with:
          name: build-artifacts
          path: target
      - run: chmod +x target/release/uniffi-bindgen target/release/uniffi-bindgen-js target/release/libgurmukhi.so
      - run: mise run generate:${{ matrix.language }}
      - run: ${{ matrix.setup }}
      - run: mise run smoke:stage
      - run: mise run smoke:${{ matrix.language }}

