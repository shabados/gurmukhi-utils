[tools]
bun = "1"
rust = { version = "1", targets = "wasm32-unknown-unknown" }
python = "3"

[env]
_.python.venv = { path = ".venv", create = true }

[tasks.build]
description = "Build Rust cdylib"
run = "cargo build --release"

[tasks."build:wasm"]
description = "Build Rust WASM binary"
run = "cargo build --release --target wasm32-unknown-unknown"

[tasks.generate]
description = "Generate UniFFI bindings for a language"
depends = ["build"]
env = { UNIFFI_LIB = "target/release/libgurmukhi_utils.so" }
run = """
cargo run --release --bin uniffi-bindgen -- generate \
  --library $UNIFFI_LIB \
  --language $UNIFFI_LANG \
  --out-dir $UNIFFI_OUT \
  --no-format
"""

[tasks."generate:ruby"]
description = "Generate Ruby bindings"
env = { UNIFFI_LANG = "ruby", UNIFFI_OUT = "bindings/ruby/lib/gurmukhi_utils" }
run = "mise run generate"

[tasks."generate:kotlin"]
description = "Generate Kotlin bindings"
env = { UNIFFI_LANG = "kotlin", UNIFFI_OUT = "bindings/kotlin/lib" }
run = "mise run generate"

[tasks."generate:swift"]
description = "Generate Swift bindings"
depends = ["build"]
run = """
#!/usr/bin/env bash
set -euo pipefail
tmpdir=$(mktemp -d)
UNIFFI_LANG=swift UNIFFI_OUT="$tmpdir" mise run generate
mv "$tmpdir/gurmukhi_utilsFFI.h" bindings/swift/Sources/gurmukhi_utilsFFI/
mv "$tmpdir/gurmukhi_utilsFFI.modulemap" bindings/swift/Sources/gurmukhi_utilsFFI/
mv "$tmpdir/gurmukhi_utils.swift" bindings/swift/Sources/GurmukhiUtils/
rm -rf "$tmpdir"
"""

[tasks."generate:javascript"]
description = "Generate JavaScript bindings (native + WASM)"
depends = ["generate:javascript:native", "generate:javascript:wasm"]

[tasks."generate:javascript:native"]
description = "Generate native Node/Bun bindings via uniffi-bindgen-node-js"
depends = ["build"]
run = """
#!/usr/bin/env bash
set -euo pipefail
uniffi-bindgen-node-js generate \
  --manifest-path Cargo.toml \
  --out-dir bindings/javascript/generated/native \
  target/release/libgurmukhi_utils.so
bun scripts/camelcase-exports.ts bindings/javascript/generated/native
"""

[tasks."generate:javascript:wasm"]
description = "Generate WASM bindings for browser via uniffi-bindgen-js"
depends = ["build:wasm"]
run = """
#!/usr/bin/env bash
set -euo pipefail
uniffi-bindgen-js generate \
  --out-dir bindings/javascript/generated/wasm \
  target/wasm32-unknown-unknown/release/gurmukhi_utils.wasm
bun scripts/flatten-wasm-namespace.ts bindings/javascript/generated/wasm
"""

[tasks."generate:python"]
description = "Generate Python bindings"
env = { UNIFFI_LANG = "python", UNIFFI_OUT = "bindings/python/gurmukhiutils" }
run = "mise run generate"

[tasks."generate:all"]
description = "Generate all language bindings"
depends = ["generate:ruby", "generate:kotlin", "generate:swift", "generate:javascript", "generate:python"]

[tasks.test]
description = "Run Rust tests"
run = "cargo test"
